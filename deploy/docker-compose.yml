services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    working_dir: /app/frontend
    command: npm run dev
    volumes:
      - ../frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/multi_media}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-litellm}
      MODEL_NAME: ${MODEL_NAME:-openai/gpt-4o-mini}
      MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-20}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-1}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.4}
      GENERATION_AUTO_START_ENABLED: ${GENERATION_AUTO_START_ENABLED:-false}
      GENERATION_BACKGROUND_WORKERS: ${GENERATION_BACKGROUND_WORKERS:-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend:/app/backend
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multi_media}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  frontend_node_modules:
